name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:  # 也支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --console --name DocNameCleaner --clean rename.py

      - name: Prepare release files
        run: |
          mkdir release
          copy dist\DocNameCleaner.exe release\
          copy keywords.txt release\
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocNameCleaner-windows
          path: release/

      # 有 tag 时自动创建 GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/DocNameCleaner.exe
            release/keywords.txt
          body: |
            ## 使用方法
            1. 下载 `DocNameCleaner.exe` 和 `keywords.txt`，放到同一个文件夹
            2. 编辑 `keywords.txt`，每行填入一个要从文件名开头删除的词汇
            3. 双击 `DocNameCleaner.exe` 运行
